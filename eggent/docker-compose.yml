name: mfagent

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mfagent:local
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      TMPDIR: ${APP_TMP_DIR:-/app/data/tmp}
      PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/app/data/ms-playwright}
      npm_config_cache: ${NPM_CONFIG_CACHE:-/app/data/npm-cache}
      XDG_CACHE_HOME: ${XDG_CACHE_HOME:-/app/data/.cache}
      OLLAMA_HOST: "0.0.0.0"
    ports:
      - "${APP_BIND_HOST:-0.0.0.0}:${APP_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ollama:/root/.ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "olap:${MSSQL_HOST:-10.10.6.15}"
      - "olap.praktik.loc:${MSSQL_HOST:-10.10.6.15}"
      - "srv-sql:${MSSQL_HOST_2:-10.10.6.107}"
      - "srv-sql.praktik.loc:${MSSQL_HOST_2:-10.10.6.107}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  ollama:
